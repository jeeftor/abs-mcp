# See https://pre-commit.com for more information.
# Install hooks with: prek install && prek install --hook-type commit-msg

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -w
        language: system
        types: [go]
        pass_filenames: true

      - id: go-doc-comments
        name: go doc comments
        entry: python3 scripts/check_go_doc.py
        language: system
        types: [go]
        pass_filenames: true

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        pass_filenames: false

      - id: validate-server-json
        name: validate server.json
        entry: python3 scripts/validate_server_json.py
        language: system
        pass_filenames: false

      - id: comparison-freshness
        name: comparison freshness
        entry: python3 scripts/check_comparison_freshness.py
        language: system
        pass_filenames: false
        verbose: true

      - id: script-tests
        name: script tests
        entry: python3 -m unittest discover -s scripts -p test_*.py
        language: system
        pass_filenames: false
