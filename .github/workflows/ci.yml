name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

env:
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: go
            command: go test ./...
          - name: scripts
            command: python3 -m unittest discover -s scripts -p 'test_*.py'
          - name: build
            command: make build
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  abs-integration:
    name: ABS Integration (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-fixture
            test: TestABSFixtureLibrariesAndItems
          - name: mcp-stdio-fixture
            test: TestMCPServerAgainstABSFixture
    env:
      ABS_IMAGE: ghcr.io/advplyr/audiobookshelf:latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare ABS fixture
        run: make abs-ci-smoke

      - name: Run ${{ matrix.name }}
        run: go test -tags=abs_integration ./test/abs/integration -count=1 -run '^${{ matrix.test }}$' -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: abs-mcp:ci
