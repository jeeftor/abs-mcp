name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          package="abs-mcp_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${package}"
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -trimpath -ldflags="-s -w" -o "dist/${package}/abs-mcp${ext}" ./cmd/abs-mcp
          cp README.md LICENSE "dist/${package}/"
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip -r "${package}.zip" "${package}")
          else
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: abs-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - binaries
      - image
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
